<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>emre.wtf</title>
    <style>
        /* Temel Sıfırlama */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden; /* Kaydırma çubuklarını gizle */
            background-color: black; /* Arka plan düz siyah */
            font-family: sans-serif;
        }

        /* Ortadaki resim için kapsayıcı */
        .center-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center; /* Yatayda ortala */
            align-items: center;    /* Dikeyde ortala */
            z-index: 10;
        }

        /* Mambo Resmi Stili */
        #mambo-image {
            max-width: 300px; /* Resmin maksimum genişliği */
            height: auto;
            cursor: pointer; /* Tıklanabilir olduğunu göstermek için el ikonu */
            transition: transform 0.2s ease; /* Efektler için geçiş süresi */
            
            /* Siyah arka planda resmi belirginleştirmek için hafif bir gölge (isteğe bağlı) */
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.3));
        }

        /* Etkileşim Efektleri */
        #mambo-image:hover {
            transform: scale(1.05); /* Fare üzerine gelince hafif büyüt */
        }
        #mambo-image:active {
            transform: scale(0.95); /* Tıklayınca hafif küçült (basılma hissi) */
        }

        /* Mobil Ekran Ayarı */
        @media (max-width: 600px) {
            #mambo-image {
                max-width: 180px; /* Mobilde resmi biraz küçült */
            }
        }
    </style>
</head>
<body>

    <div class="center-container">
        <img src="mambo.webp" alt="Mambo" id="mambo-image" onclick="playMamboSound()">
    </div>

    <audio id="mambo-sound" preload="auto">
        <source src="mambo.mp4" type="video/mp4">
    </audio>

    <script>
        // Ses çalma fonksiyonu
        function playMamboSound() {
            var sound = document.getElementById("mambo-sound");
            
            // Eğer ses zaten çalıyorsa başa sar (peş peşe tıklama desteği)
            sound.currentTime = 0;
            
            // Sesi oynat
            sound.play().catch(function(error) {
                console.log("Ses oynatılamadı, tarayıcı engellemiş olabilir:", error);
            });
        }
    </script>

</body>
</html>
